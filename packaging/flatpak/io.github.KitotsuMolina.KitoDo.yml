app-id: io.github.KitotsuMolina.KitoDo
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
command: kitodo
separate-locales: false
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
  - org.freedesktop.Sdk.Extension.rust-stable
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-data/kitodo:create
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1
  - --env=WEBKIT_DISABLE_COMPOSITING_MODE=1
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - /share/gtk-doc
modules:
  - name: kitodo
    buildsystem: simple
    build-commands:
      - export PATH="/usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin:$PATH" && corepack enable
      - export PATH="/usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin:$PATH" && pnpm install --frozen-lockfile
      - export PATH="/usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin:$PATH" && pnpm build
      - export PATH="/usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin:$PATH" && cargo build --manifest-path src-tauri/Cargo.toml --release --bin kitodo --bin kitodo-cli
      - install -Dm755 src-tauri/target/release/kitodo /app/bin/kitodo
      - install -Dm755 src-tauri/target/release/kitodo-cli /app/bin/kitodo-cli
      - install -Dm644 packaging/flatpak/io.github.KitotsuMolina.KitoDo.desktop /app/share/applications/io.github.KitotsuMolina.KitoDo.desktop
      - install -Dm644 packaging/flatpak/io.github.KitotsuMolina.KitoDo.metainfo.xml /app/share/metainfo/io.github.KitotsuMolina.KitoDo.metainfo.xml
      - install -Dm644 packaging/flatpak/icons/io.github.KitotsuMolina.KitoDo.svg /app/share/icons/hicolor/scalable/apps/io.github.KitotsuMolina.KitoDo.svg
    sources:
      - type: dir
        path: ../..
