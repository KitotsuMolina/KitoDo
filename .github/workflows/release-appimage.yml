name: Release AppImage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version semver sin v (ej. 0.5.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux-appimage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            imagemagick \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libglib2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Sync and inspect Tauri icons
        run: |
          bash ./scripts/sync-tauri-icon.sh
          echo "--- ls src-tauri/icons ---"
          ls -la src-tauri/icons
          echo "--- file src-tauri/icons/* ---"
          file src-tauri/icons/*
          echo "--- identify src-tauri/icons/* ---"
          identify src-tauri/icons/32x32.png
          identify src-tauri/icons/128x128.png
          identify src-tauri/icons/128x128@2x.png
          identify src-tauri/icons/icon.png
          echo "--- tauri bundle config ---"
          node -e "const c=require('./src-tauri/tauri.conf.json'); console.log(JSON.stringify(c.bundle,null,2))"

      - name: Build frontend
        run: pnpm build

      - name: Build release binary
        env:
          RUST_BACKTRACE: full
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --bin kitodo

      - name: Package AppImage with linuxdeploy
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "${VERSION}" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          install -m755 src-tauri/target/release/kitodo AppDir/usr/bin/kitodo
          install -m644 packaging/appimage/io.github.KitotsuMolina.KitoDo.desktop AppDir/usr/share/applications/io.github.KitotsuMolina.KitoDo.desktop
          install -m644 src-tauri/icons/128x128@2x.png AppDir/usr/share/icons/hicolor/256x256/apps/io.github.KitotsuMolina.KitoDo.png

          curl -L -o linuxdeploy-x86_64.AppImage https://github.com/tauri-apps/binary-releases/releases/download/linuxdeploy/linuxdeploy-x86_64.AppImage
          curl -L -o linuxdeploy-plugin-gtk.sh https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          curl -L -o linuxdeploy-plugin-appimage-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage

          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh linuxdeploy-plugin-appimage-x86_64.AppImage

          export VERSION
          export OUTPUT="KitoDo_amd64.AppImage"
          export ARCH=x86_64

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            -e AppDir/usr/bin/kitodo \
            -d packaging/appimage/io.github.KitotsuMolina.KitoDo.desktop \
            -i src-tauri/icons/128x128@2x.png \
            --plugin gtk \
            --output appimage

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Version invalida: ${VERSION}" >&2
              exit 1
            fi
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi

          APPIMAGE="$(find . -maxdepth 1 -type f -name 'KitoDo*.AppImage' | sort | tail -n 1)"
          if [[ -z "${APPIMAGE}" ]]; then
            echo "No AppImage found" >&2
            exit 1
          fi

          RENAMED_DIR="dist/${VERSION}"
          RENAMED_APPIMAGE="${RENAMED_DIR}/KitoDo_amd64.AppImage"
          mkdir -p "${RENAMED_DIR}"
          mv "${APPIMAGE}" "${RENAMED_APPIMAGE}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "appimage=${RENAMED_APPIMAGE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.appimage }}
