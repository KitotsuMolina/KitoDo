name: Release AppImage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version semver sin v (ej. 0.5.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux-appimage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnss3-dev libasound2-dev libxtst-dev libxss1 libfuse2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Build AppImage
        run: ./scripts/build-appimage.sh

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Version invalida: ${VERSION}" >&2
              exit 1
            fi
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi

          BUNDLE="$(find dist-electron -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          if [[ -z "${BUNDLE}" ]]; then
            echo "No AppImage found" >&2
            exit 1
          fi

          RENAMED_DIR="dist/${VERSION}"
          RENAMED_BUNDLE="${RENAMED_DIR}/KitoDo_linux_x86_64.AppImage"
          mkdir -p "${RENAMED_DIR}"
          cp -f "${BUNDLE}" "${RENAMED_BUNDLE}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "bundle=${RENAMED_BUNDLE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.bundle }}
